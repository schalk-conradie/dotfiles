"$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 50
command_timeout = 5000

format = """
[î‚¶](color_orange)\
$os\
$username\
[î‚°](bg:color_yellow fg:color_orange)\
$directory\
[î‚°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[î‚°](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[î‚°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[î‚°](fg:color_bg3 bg:color_bg1)\
$time\
[î‚´ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
Macos = "َ°€µ"
Linux = "َ°Œ½"
Alpine = "ïŒ€"
Arch = "َ°£‡"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
Pop = "ïŒھ"

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "ïگک"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'
ignore_submodules = true  # Speed up large repos

[nodejs]
symbol = "îœک"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "jsx", "mts", "cts"]
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[golang]
symbol = "îک§"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum", "go.work"]
detect_folders = ["Godeps", "vendor"]

[python]
symbol = "îک†"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_extensions = ["py", "ipynb", "pyc", "pyo", "pyd"]
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", "poetry.lock", "setup.cfg", "tox.ini", ".python-version", "manage.py"]
detect_folders = ["__pycache__", ".venv", "venv", ".conda", "env"]

[docker_context]
symbol = "ïŒˆ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'
detect_files = ["Dockerfile", "docker-compose.yml", "compose.yml", "docker-compose.yaml", "compose.yaml", ".dockerignore"]
detect_folders = [".docker"]

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ïگ²](bold fg:color_green)'
error_symbol = '[ïگ²](bold fg:color_red)'
vimcmd_symbol = '[ïگ´](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_replace_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_visual_symbol = '[ïگ´](bold fg:color_yellow)'
